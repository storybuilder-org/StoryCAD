name: Build & Release

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.{png,jpg,jpeg,svg,gif}'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.{png,jpg,jpeg,svg,gif}'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag / version (e.g. v4.0.0)'
        required: true
        type: string
      skip_release:
        description: 'Skip creating a release (build only)'
        required: false
        type: boolean
        default: true
permissions:
  contents: write

concurrency:
  group: storycad-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_version: ${{ steps.version.outputs.tag_version }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_RESTORE_LOCKED_MODE: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            fw: net10.0-windows10.0.22621.0
            art: win-x64
            platform: x64
            binary_name: StoryCAD.exe
          - os: windows-latest
            rid: win-arm64
            fw: net10.0-windows10.0.22621.0
            art: win-arm64
            platform: ARM64
            binary_name: StoryCAD.exe
          - os: windows-latest
            rid: win-x86
            fw: net10.0-windows10.0.22621.0
            art: win-x86
            platform: x86
            binary_name: StoryCAD.exe
          - os: macos-latest
            rid: osx-arm64
            fw: net10.0-desktop
            art: osx-arm64
            platform: arm64
            binary_name: StoryCAD.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'
          global-json-file: './global.json'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Install Uno macOS workload
        if: matrix.os == 'macos-latest'
        run: dotnet workload install macos
        
      - name: Generate version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            if ("${{ github.event.inputs.skip_release }}" -eq "false") {
              # Release mode: use version verbatim
              $v = "${{ github.event.inputs.version }}".TrimStart('v')
            } else {
              # Draft mode: use major.minor.run_number.65534
              $parts = "${{ github.event.inputs.version }}".TrimStart('v').Split('.')
              $v = "$($parts[0]).$($parts[1]).${{ github.run_number }}.65534"
            }
          } else {
            $v = "1.0.${{ github.run_number }}.65534"
          }
          "version=$v"       >> $env:GITHUB_OUTPUT
          "tag_version=v$v"  >> $env:GITHUB_OUTPUT
          Write-Host "Generated version: $v"
          
      - name: Restore
        run: dotnet restore StoryCAD.sln

      - name: Update Package.appxmanifest version (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $manifestPath = Join-Path "${{ github.workspace }}" "StoryCAD\Package.appxmanifest"
          [xml]$xml = Get-Content $manifestPath
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace('ns', $xml.DocumentElement.NamespaceURI)
          $identity = $xml.SelectSingleNode('/ns:Package/ns:Identity', $ns)
          $identity.SetAttribute('Version', '${{ steps.version.outputs.version }}')
          $xml.Save($manifestPath)
          Write-Host "Updated manifest version to ${{ steps.version.outputs.version }}"

      - name: Update StoryCADLib.csproj version
        shell: pwsh
        run: |
          $csprojPath = Join-Path "${{ github.workspace }}" "StoryCADLib\StoryCADLib.csproj"
          [xml]$xml = Get-Content $csprojPath
          $versionNode = $xml.SelectSingleNode('//Version')
          $assemblyVersionNode = $xml.SelectSingleNode('//AssemblyVersion')
          $fileVersionNode = $xml.SelectSingleNode('//FileVersion')
          if ($versionNode) { $versionNode.InnerText = '${{ steps.version.outputs.version }}' }
          if ($assemblyVersionNode) { $assemblyVersionNode.InnerText = '${{ steps.version.outputs.version }}' }
          if ($fileVersionNode) { $fileVersionNode.InnerText = '${{ steps.version.outputs.version }}' }
          $xml.Save($csprojPath)
          Write-Host "Updated StoryCADLib.csproj version to ${{ steps.version.outputs.version }}"

      - name: Decode real PFX and write .env (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ("${{ secrets.BASE64_ENCODED_PFX }}".Length -eq 0) {
            throw "Real PFX not available. Forked PRs cannot access secrets."
          }
          $bytes = [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $pfxPath = "${{ github.workspace }}\StoryCAD\GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          if ("${{ secrets.ENV }}".Length -gt 0) {
            [IO.File]::WriteAllText("${{ github.workspace }}\StoryCAD\.env", "${{ secrets.ENV }}")
            [IO.File]::WriteAllText("${{ github.workspace }}\StoryCADTests\.env", "${{ secrets.ENV }}")
          }

      - name: Run tests (Windows x64)
        if: matrix.os == 'windows-latest' && matrix.platform == 'x64'
        run: dotnet test --project StoryCADTests/StoryCADTests.csproj --configuration Release --no-restore -p:Platform=${{ matrix.platform }} -f net10.0-desktop

      - name: Write .env (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -n "${{ secrets.ENV }}" ]; then
            echo "${{ secrets.ENV }}" > "${{ github.workspace }}/StoryCAD/.env"
            echo "${{ secrets.ENV }}" > "${{ github.workspace }}/StoryCADTests/.env"
          fi

      - name: Setup macOS signing
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATES_BASE64: ${{ secrets.APPLE_CERTIFICATES_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificates
          echo "$APPLE_CERTIFICATES_BASE64" | base64 --decode > $RUNNER_TEMP/certs.p12
          security import $RUNNER_TEMP/certs.p12 -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Save provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/storycad.provisionprofile

          # Clean up cert file
          rm $RUNNER_TEMP/certs.p12

      - name: Run all tests (macOS)
        if: matrix.os == 'macos-latest'
        run: dotnet test --project StoryCADTests/StoryCADTests.csproj --configuration Release --no-restore -f net10.0-desktop

      # 10 ─ Setup MSBuild (Windows only)
      - name: Setup MSBuild
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      # 11 ─ Build MSIX package (Windows only)
      - name: Create MSIX package
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $pfx = "${{ github.workspace }}\StoryCAD\GitHubActionsWorkflow.pfx"
          if (-not (Test-Path $pfx)) { throw "PFX missing. Cannot sign MSIX." }
          $msbuildArgs = @(
            'StoryCAD.sln',
            '/m',
            '/p:Configuration=Release',
            '/p:Platform=${{ matrix.platform }}',
            '/p:UapAppxPackageBuildMode=SideloadOnly',
            '/p:AppxBundle=Never',
            "/p:PackageCertificateKeyFile=$pfx",
            "/p:AppxPackageDir=${{ github.workspace }}\StoryCAD\Packages\",
            '/p:GenerateAppxPackageOnBuild=true',
            '/p:PublishReadyToRun=false'
          )
          if ("${{ secrets.PFX_PASSWORD }}".Length -gt 0) {
            $msbuildArgs += "/p:PackageCertificatePassword=${{ secrets.PFX_PASSWORD }}"
          }
          & msbuild @msbuildArgs

      - name: Remove PFX and .env (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        continue-on-error: true
        run: |
          Remove-Item "${{ github.workspace }}\StoryCAD\GitHubActionsWorkflow.pfx" -Force -ErrorAction SilentlyContinue
          Remove-Item "${{ github.workspace }}\StoryCAD\.env","${{ github.workspace }}\StoryCADTests\.env" -Force -ErrorAction SilentlyContinue

      - name: Remove .env (macOS)
        if: matrix.os == 'macos-latest'
        continue-on-error: true
        run: |
          rm -f "${{ github.workspace }}/StoryCAD/.env"
          rm -f "${{ github.workspace }}/StoryCADTests/.env"

      - name: Publish macOS package
        if: matrix.os == 'macos-latest'
        run: |
          # Build
          dotnet publish StoryCAD/StoryCAD.csproj -c Release -f ${{ matrix.fw }} -r ${{ matrix.rid }} --self-contained true

          # Create app bundle
          APP_DIR="/tmp/StoryCAD.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp -R StoryCAD/bin/Release/${{ matrix.fw }}/${{ matrix.rid }}/publish/* "$APP_DIR/Contents/MacOS/"
          mv "$APP_DIR/Contents/MacOS/Assets" "$APP_DIR/Contents/Resources/"
          mv "$APP_DIR/Contents/MacOS/Uno.Fonts.OpenSans" "$APP_DIR/Contents/Resources/" 2>/dev/null || true
          mv "$APP_DIR/Contents/MacOS/Uno.Fonts.Fluent" "$APP_DIR/Contents/Resources/" 2>/dev/null || true
          cp StoryCAD/Platforms/Desktop/Info.plist "$APP_DIR/Contents/Info.plist"
          cp $RUNNER_TEMP/storycad.provisionprofile "$APP_DIR/Contents/embedded.provisionprofile"
          chmod +x "$APP_DIR/Contents/MacOS/StoryCAD"
          xattr -cr "$APP_DIR"

          # Create icon
          SRC="StoryCAD/Assets/LargeTile.scale-400.png"
          mkdir -p /tmp/icon.iconset
          sips -z 16 16 "$SRC" --out /tmp/icon.iconset/icon_16x16.png
          sips -z 32 32 "$SRC" --out /tmp/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 "$SRC" --out /tmp/icon.iconset/icon_32x32.png
          sips -z 64 64 "$SRC" --out /tmp/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 "$SRC" --out /tmp/icon.iconset/icon_128x128.png
          sips -z 256 256 "$SRC" --out /tmp/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 "$SRC" --out /tmp/icon.iconset/icon_256x256.png
          sips -z 512 512 "$SRC" --out /tmp/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 "$SRC" --out /tmp/icon.iconset/icon_512x512.png
          sips -z 1024 1024 "$SRC" --out /tmp/icon.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/icon.iconset -o "$APP_DIR/Contents/Resources/icon.icns"

          # Sign (entitlements from repo)
          ENTITLEMENTS="StoryCAD/Platforms/Desktop/entitlements.plist"
          HELPER_ENTITLEMENTS="StoryCAD/Platforms/Desktop/helper-entitlements.plist"

          find "$APP_DIR/Contents/MacOS" -type f ! -name "StoryCAD" ! -name "createdump" -exec codesign --force --sign "Apple Distribution: StoryBuilder Foundation (3T4DPS2D5Y)" {} \; 2>/dev/null || true
          find "$APP_DIR/Contents/Resources" -type f -exec codesign --force --sign "Apple Distribution: StoryBuilder Foundation (3T4DPS2D5Y)" {} \; 2>/dev/null || true
          codesign --force --options runtime --sign "Apple Distribution: StoryBuilder Foundation (3T4DPS2D5Y)" --entitlements "$HELPER_ENTITLEMENTS" "$APP_DIR/Contents/MacOS/createdump"
          codesign --force --options runtime --sign "Apple Distribution: StoryBuilder Foundation (3T4DPS2D5Y)" --entitlements "$ENTITLEMENTS" "$APP_DIR/Contents/MacOS/StoryCAD"
          codesign --force --options runtime --sign "Apple Distribution: StoryBuilder Foundation (3T4DPS2D5Y)" --entitlements "$ENTITLEMENTS" "$APP_DIR"

          # Verify signature
          codesign -vvv "$APP_DIR"

          # Create PKG
          productbuild --component "$APP_DIR" /Applications --sign "3rd Party Mac Developer Installer: StoryBuilder Foundation (3T4DPS2D5Y)" storycad-${{ matrix.art }}.pkg

      - name: Zip MSIX artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zipName = "storycad-msix-${{ matrix.art }}.zip"
          Compress-Archive -Path "${{ github.workspace }}\StoryCAD\Packages\*" -DestinationPath $zipName -Force

      - name: Upload MSIX (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: storycad-msix-${{ matrix.art }}
          path: storycad-msix-${{ matrix.art }}.zip
          if-no-files-found: error

      - name: Upload PKG (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: storycad-${{ matrix.art }}
          path: storycad-${{ matrix.art }}.pkg
          if-no-files-found: error

      - name: Cleanup macOS signing
        if: matrix.os == 'macos-latest' && always()
        continue-on-error: true
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/storycad.provisionprofile

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && !inputs.skip_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_version }}
          name: Release ${{ needs.build.outputs.tag_version }}
          files: |
            storycad-msix-win-x64/storycad-msix-win-x64.zip
            storycad-msix-win-arm64/storycad-msix-win-arm64.zip
            storycad-msix-win-x86/storycad-msix-win-x86.zip
            storycad-osx-arm64/storycad-osx-arm64.pkg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
