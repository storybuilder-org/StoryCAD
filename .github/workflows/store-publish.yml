name: Publish to Stores

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v4.0.0)"
        required: true
        type: string
      publish_msstore:
        description: "Publish to Microsoft Store"
        required: false
        type: boolean
        default: true
      publish_appstore:
        description: "Publish to Apple App Store"
        required: false
        type: boolean
        default: true
      publish_nuget:
        description: "Publish to NuGet"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: store-publish
  cancel-in-progress: false

jobs:
  microsoft-publish:
    if: github.event_name == 'release' || inputs.publish_msstore
    runs-on: ubuntu-latest
    env:
      MS_APP_ID: 9PLBNHZV1XM2
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Download MSIX zips from release (all 3 archs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p packages
          for arch in win-x64 win-arm64 win-x86; do
            gh release download "${{ steps.tag.outputs.tag }}" \
              --repo ${{ github.repository }} \
              --pattern "storycad-msix-$arch.zip" \
              --dir packages
          done
          ls -la packages

      - name: Extract MSIX files
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path packages -Filter '*.zip'
          if ($zips.Count -ne 3) { throw "Expected 3 MSIX zips (x64, arm64, x86), got $($zips.Count)" }
          foreach ($zip in $zips) {
            $extract = Join-Path 'packages' $zip.BaseName
            Expand-Archive -Path $zip.FullName -DestinationPath $extract -Force
          }
          $msixFiles = Get-ChildItem -Path packages -Filter '*.msix' -Recurse |
            Where-Object { $_.Extension -eq '.msix' }
          if ($msixFiles.Count -ne 3) { throw "Expected 3 .msix files (one per arch), got $($msixFiles.Count): $($msixFiles.FullName -join ', ')" }
          Write-Host "Found MSIX files:"
          $msixFiles | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Fetch changelog from release body
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        shell: pwsh
        run: |
          $notes = gh release view $env:TAG --repo $env:GITHUB_REPOSITORY --json body --jq .body
          if ([string]::IsNullOrWhiteSpace($notes)) {
            throw "Release body for $env:TAG is empty. Refusing to publish placeholder release notes."
          }
          # Store release notes limit is ~1500 chars per listing
          if ($notes.Length -gt 1500) { $notes = $notes.Substring(0, 1500) }
          Set-Content -Path changelog.txt -Value $notes -Encoding utf8
          Write-Host "Changelog length: $($notes.Length) chars"

      - name: Upload packages + release notes to Partner Center (no commit)
        env:
          PC_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PC_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PC_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Collect all .msix files (x64, arm64, x86 — one each)
          $msixFiles = Get-ChildItem -Path packages -Filter '*.msix' -Recurse |
            Where-Object { $_.Extension -eq '.msix' }
          if ($msixFiles.Count -ne 3) { throw "Expected 3 .msix files, got $($msixFiles.Count)" }

          # 1. OAuth token against Azure AD (Store Submission API resource)
          $tokenBody = @{
            grant_type    = 'client_credentials'
            client_id     = $env:PC_CLIENT_ID
            client_secret = $env:PC_CLIENT_SECRET
            resource      = 'https://manage.devcenter.microsoft.com'
          }
          $token = (Invoke-RestMethod -Method Post `
            -Uri "https://login.microsoftonline.com/$env:PC_TENANT_ID/oauth2/token" `
            -Body $tokenBody).access_token
          $headers = @{ Authorization = "Bearer $token"; 'Content-Type' = 'application/json' }
          $base = "https://manage.devcenter.microsoft.com/v1.0/my/applications/$env:MS_APP_ID"

          # 2. Delete any existing pending submission so we start clean
          $app = Invoke-RestMethod -Uri $base -Headers $headers
          if ($app.pendingApplicationSubmission) {
            $pendingId = $app.pendingApplicationSubmission.id
            Write-Host "Deleting existing pending submission $pendingId"
            Invoke-RestMethod -Method Delete -Uri "$base/submissions/$pendingId" -Headers $headers | Out-Null
          }

          # 3. Create new submission (clones last published submission's metadata)
          $submission = Invoke-RestMethod -Method Post -Uri "$base/submissions" -Headers $headers
          $submissionId = $submission.id
          $fileUploadUrl = $submission.fileUploadUrl
          Write-Host "Created submission $submissionId"

          # 4. Replace release notes on all listings
          $changelog = Get-Content -Raw changelog.txt
          foreach ($locale in $submission.listings.PSObject.Properties.Name) {
            $submission.listings.$locale.baseListing.releaseNotes = $changelog
          }

          # 5. Mark existing packages for deletion, add one entry per architecture.
          #    Build new entries as [pscustomobject] (not [ordered]@{}) so the
          #    resulting applicationPackages array is homogeneous PSCustomObject —
          #    ConvertTo-Json was previously dropping shape from mixed types and
          #    the API silently kept the cloned package list.
          foreach ($pkg in $submission.applicationPackages) {
            $pkg.fileStatus = 'PendingDelete'
          }
          $newPkgs = foreach ($msix in $msixFiles) {
            [pscustomobject]@{
              fileName              = $msix.Name
              fileStatus            = 'PendingUpload'
              minimumDirectXVersion = 'None'
              minimumSystemRam      = 'None'
            }
          }
          $submission.applicationPackages = @($submission.applicationPackages) + @($newPkgs)

          Write-Host "applicationPackages payload before PUT:"
          $submission.applicationPackages |
            Select-Object fileName, fileStatus |
            Format-Table | Out-String | Write-Host

          # 6. PUT the updated submission. Capture the response so we can see
          #    statusDetails / errors instead of swallowing them with Out-Null.
          $body = $submission | ConvertTo-Json -Depth 20
          try {
            $putResp = Invoke-RestMethod -Method Put -Uri "$base/submissions/$submissionId" `
              -Headers $headers -ContentType 'application/json' -Body $body
          } catch {
            $resp = $_.Exception.Response
            if ($resp) {
              $reader = [System.IO.StreamReader]::new($resp.GetResponseStream())
              $errBody = $reader.ReadToEnd()
              # Body is API JSON describing the field error — no token in there.
              Write-Host "PUT failed with $($resp.StatusCode):"
              Write-Host $errBody
            }
            throw
          }

          if ($putResp.statusDetails) {
            $errs = @($putResp.statusDetails.errors)
            $warns = @($putResp.statusDetails.warnings)
            if ($errs.Count) {
              Write-Host "PUT returned $($errs.Count) error(s):"
              $errs | ForEach-Object { Write-Host "  [$($_.code)] $($_.details)" }
              throw "Submission PUT reported errors. Refusing to upload zip."
            }
            if ($warns.Count) {
              Write-Host "PUT returned $($warns.Count) warning(s):"
              $warns | ForEach-Object { Write-Host "  [$($_.code)] $($_.details)" }
            }
          }

          # 6b. Verify the API actually persisted our package changes before we
          #     bother uploading the zip. If the PendingUpload entries aren't
          #     present, the SAS upload has nothing to attach to.
          $verify = Invoke-RestMethod -Uri "$base/submissions/$submissionId" -Headers $headers
          $expected = $msixFiles | ForEach-Object { $_.Name } | Sort-Object
          $pending = @($verify.applicationPackages |
            Where-Object { $_.fileStatus -eq 'PendingUpload' } |
            ForEach-Object { $_.fileName } | Sort-Object)

          Write-Host "Server-side applicationPackages after PUT:"
          $verify.applicationPackages |
            Select-Object fileName, fileStatus |
            Format-Table | Out-String | Write-Host

          $missing = $expected | Where-Object { $pending -notcontains $_ }
          if ($missing) {
            throw "Submission did not register PendingUpload entries for: $($missing -join ', ')"
          }

          # 7. Bundle all 3 msix files into one zip, upload to Azure Blob SAS URL.
          #    fileUploadUrl is a SAS URL — never log it.
          $zipPath = Join-Path $env:RUNNER_TEMP 'submission.zip'
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path $msixFiles.FullName -DestinationPath $zipPath
          $zipBytes = (Get-Item $zipPath).Length
          Write-Host "Uploading submission.zip ($zipBytes bytes) to Azure Blob SAS URL"

          try {
            $blobResp = Invoke-WebRequest -Method Put -Uri $fileUploadUrl -InFile $zipPath `
              -Headers @{ 'x-ms-blob-type' = 'BlockBlob' } -UseBasicParsing
          } catch {
            $resp = $_.Exception.Response
            if ($resp) {
              Write-Host "Blob upload failed with $($resp.StatusCode)."
            }
            throw
          }
          Write-Host "Blob upload returned HTTP $($blobResp.StatusCode)."
          if ($blobResp.StatusCode -lt 200 -or $blobResp.StatusCode -ge 300) {
            throw "Blob upload returned non-success status: $($blobResp.StatusCode)"
          }

          # 8. DO NOT commit. Leaves submission as draft in Partner Center.
          Write-Host "Submission $submissionId uploaded with $($msixFiles.Count) packages. NOT committed."
          Write-Host "Review and submit manually in Partner Center."

  apple-publish:
    if: github.event_name == 'release' || inputs.publish_appstore
    runs-on: macos-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Download PKG from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern 'storycad-osx-arm64.pkg' \
            --dir .

      - name: Install App Store Connect API key
        env:
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_B64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Fetch changelog from release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > changelog.txt
          if [ ! -s changelog.txt ]; then
            echo "Release body is empty. Refusing to publish placeholder release notes." >&2
            exit 1
          fi
          # Apple whatsNew limit is 4000 chars
          head -c 4000 changelog.txt > changelog.trimmed.txt
          mv changelog.trimmed.txt changelog.txt
          echo "Changelog length: $(wc -c < changelog.txt) chars"

      - name: Extract bundle versions from PKG
        id: pkgver
        run: |
          set -euo pipefail
          # PKGs are xar archives. Expand, then read the .app's Info.plist so
          # the values we pass to altool match exactly what's signed inside.
          rm -rf pkg-expanded
          pkgutil --expand-full storycad-osx-arm64.pkg pkg-expanded
          PLIST=$(find pkg-expanded -path '*/StoryCAD.app/Contents/Info.plist' -print -quit)
          if [ -z "$PLIST" ]; then
            echo "::error::Could not locate StoryCAD.app/Contents/Info.plist inside pkg" >&2
            exit 1
          fi
          SHORT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "bundle=$BUNDLE" >> $GITHUB_OUTPUT
          echo "CFBundleShortVersionString=$SHORT  CFBundleVersion=$BUNDLE"
          rm -rf pkg-expanded

      - name: Upload to App Store Connect
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_ID: ${{ secrets.APPLE_APP_ID }}
        run: |
          xcrun altool --upload-package storycad-osx-arm64.pkg \
            --type macos \
            --apple-id "$APPLE_APP_ID" \
            --bundle-id com.storybuilder.storycad \
            --bundle-short-version-string "${{ steps.pkgver.outputs.short }}" \
            --bundle-version "${{ steps.pkgver.outputs.bundle }}" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Patch "What's New" on draft App Store version (no submit)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_APP_ID: ${{ secrets.APPLE_APP_ID }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          python3 -m pip install --quiet pyjwt cryptography requests
          python3 <<'PY'
          import jwt, os, sys, time, pathlib, requests

          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          app_id = os.environ['APPLE_APP_ID']
          tag = os.environ['TAG']
          version_string = tag.lstrip('v')

          key_path = pathlib.Path.home() / '.appstoreconnect' / 'private_keys' / f'AuthKey_{key_id}.p8'
          private_key = key_path.read_text()

          token = jwt.encode(
              {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              private_key, algorithm='ES256', headers={'kid': key_id})

          s = requests.Session()
          s.headers['Authorization'] = f'Bearer {token}'
          BASE = 'https://api.appstoreconnect.apple.com/v1'

          whats_new = pathlib.Path('changelog.txt').read_text()[:4000]
          if not whats_new.strip():
              print("changelog.txt is empty, refusing to patch.", file=sys.stderr)
              sys.exit(1)

          # Find a MAC_OS version in an editable state
          editable = 'PREPARE_FOR_SUBMISSION,DEVELOPER_REJECTED,METADATA_REJECTED,REJECTED,INVALID_BINARY'
          r = s.get(f'{BASE}/apps/{app_id}/appStoreVersions',
                    params={'filter[platform]': 'MAC_OS', 'filter[appStoreState]': editable, 'limit': 5})
          r.raise_for_status()
          versions = r.json()['data']

          if versions:
              version_id = versions[0]['id']
              print(f'Using existing editable version {version_id} (state={versions[0]["attributes"]["appStoreState"]})')
          else:
              payload = {'data': {
                  'type': 'appStoreVersions',
                  'attributes': {'platform': 'MAC_OS', 'versionString': version_string},
                  'relationships': {'app': {'data': {'type': 'apps', 'id': app_id}}}}}
              r = s.post(f'{BASE}/appStoreVersions', json=payload)
              if not r.ok:
                  print(r.text, file=sys.stderr); r.raise_for_status()
              version_id = r.json()['data']['id']
              print(f'Created version {version_id}')

          # Find or create en-US localization, then PATCH whatsNew
          r = s.get(f'{BASE}/appStoreVersions/{version_id}/appStoreVersionLocalizations')
          r.raise_for_status()
          en_us = next((l for l in r.json()['data'] if l['attributes']['locale'] == 'en-US'), None)

          if en_us:
              loc_id = en_us['id']
              payload = {'data': {'type': 'appStoreVersionLocalizations', 'id': loc_id,
                                  'attributes': {'whatsNew': whats_new}}}
              r = s.patch(f'{BASE}/appStoreVersionLocalizations/{loc_id}', json=payload)
          else:
              payload = {'data': {
                  'type': 'appStoreVersionLocalizations',
                  'attributes': {'locale': 'en-US', 'whatsNew': whats_new},
                  'relationships': {'appStoreVersion': {'data': {'type': 'appStoreVersions', 'id': version_id}}}}}
              r = s.post(f'{BASE}/appStoreVersionLocalizations', json=payload)

          if not r.ok:
              print(r.text, file=sys.stderr); r.raise_for_status()
          print("Patched whatsNew. Not submitting for review.")
          PY

      - name: Clean up API key
        if: always()
        continue-on-error: true
        run: rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8

  nuget-publish:
    if: github.event_name == 'release' || inputs.publish_nuget
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Download nupkg from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern '*.nupkg' \
            --dir .
          ls -la *.nupkg

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push '*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
